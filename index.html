<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="atm">
        <img src="assets/images/illustration-article.svg" alt="atm-card">
      </div>
      <span class="yellow">Learning
      </span>
      <br>
      <p class="first">Published 21 Dec 2023</p>
      <br>
      <h2> HTML & CSS foundations</h2>
      <p class="second"> These languages are the backbone of every website, defining structure, content, and
        presentation.
      </p>
      <br>
      <div class="avatar">
        <img src="assets/images/image-avatar.webp" alt="avatar"><span> Greg Hooper</span>
      </div>
    </div>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Miracle Omeje</a>.
    </footer>
  </div>

</body>

</html>
